<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}PriceWise{% endblock %}</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body class="bg-slate-950 text-white">

    <!-- Navbar -->
    <nav class="fixed top-0 left-0 right-0 z-50 bg-slate-950 border-b border-indigo-500/20">
        <div class="max-w-7xl mx-auto px-4">
            <div class="flex items-center justify-between h-16">

                <!-- Logo -->
                <a href="{{ url_for('landing_page') }}"
                   class="flex items-center gap-2">
                    <div class="w-9 h-9 rounded-lg bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center">
                        <i class="fas fa-chart-line text-white"></i>
                    </div>
                    <span class="text-xl font-bold">
                        PriceWise
                    </span>
                </a>

                <!-- Desktop Menu -->
                <div class="hidden md:flex items-center gap-8">

                    <a href="{{ url_for('landing_page') }}"
                       class="hover:text-indigo-400">
                        <i class="fas fa-home mr-1"></i>
                        Home
                    </a>

                    <a href="{{ url_for('about') }}"
                       class="hover:text-indigo-400">
                        <i class="fas fa-info-circle mr-1"></i>
                        About
                    </a>

                    <a href="{{ url_for('profile') }}"
                       class="hover:text-indigo-400">
                        <i class="fas fa-user mr-1"></i>
                        Profile
                    </a>

                </div>

            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="pt-20">
        {% block content %}
        {% endblock %}
    </main>

    <!-- Footer -->
    <footer class="border-t border-indigo-500/20 py-6 mt-10">
        <div class="max-w-7xl mx-auto px-4 text-center">
            <p>
                © 2026 PriceWise | House Price Prediction Project
            </p>
        </div>
    </footer>

</body>
</html>
